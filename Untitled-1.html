<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centered Logo Page</title>
    <style>
        /* Reset margins and ensure the body takes up the full screen height */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center; /* Horizontally center the logo */
            align-items: center;     /* Vertically center the logo */
            min-height: 100vh;       /* Full viewport height */
            background-color: #ffffff; /* Clean white background */
            font-family: Arial, sans-serif;
        }

        .logo-container {
            text-align: center;
            padding: 20px;
        }

        .logo-container img {
            max-width: 100%;
            height: auto;
            width: 350px; /* Adjust this value to make the logo larger or smaller */
            display: block;
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="image_ff064f.png" alt="Karpagam College of Engineering Logo">
    </div>

</body>
</html>
